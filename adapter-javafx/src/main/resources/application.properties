spring.application.name=Gestione Annotazioni Desktop

# Disabilita web application type per JavaFX
spring.main.web-application-type=none

# Profilo attivo (sqlite per sviluppo locale)
spring.profiles.active=sqlite

# SQLite Configuration
spring.datasource.url=jdbc:sqlite:data/gestione_annotazioni_javafx.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Configurazione JPA per SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.physical_naming_strategy=it.alnao.springbootexample.core.config.CustomPhysicalNamingStrategy
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Disabilita MongoDB, Cosmos, Redis, Security OAuth2
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Logging
logging.level.it.alnao.springbootexample=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN

# Disabilita banner Spring Boot per applicazione desktop
spring.main.banner-mode=off

# Configurazione utenti di default
app.init.users.enabled=true
